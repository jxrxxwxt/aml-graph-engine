version: '3.8'

services:
  # Relational Database for maintaining configurations and metadata
  postgres:
    image: postgres:15-alpine
    container_name: aml_postgres
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aml_network

  # Graph Database for tracking and analyzing transaction relationships
  neo4j:
    image: neo4j:5.11
    container_name: aml_neo4j
    env_file:
      - ../.env
    environment:
      # Enable APOC plugin required for advanced graph operations
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_auth__enabled: 'true'
    ports:
      - "7474:7474" # HTTP Browser UI
      - "7687:7687" # Bolt Protocol for application connection
    volumes:
      - neo4j_data:/data
    networks:
      - aml_network

  # Zookeeper required for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: aml_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - aml_network

  # Message Broker for handling high-throughput transaction streams
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: aml_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - aml_network

  # Spark Master Node for managing distributed data processing
  spark-master:
    image: bitnami/spark:3.4
    container_name: aml_spark_master
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080" # Spark Master Web UI
      - "7077:7077" # Spark Master Port
    networks:
      - aml_network

  # Spark Worker Node for executing processing tasks
  spark-worker:
    image: bitnami/spark:3.4
    container_name: aml_spark_worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      # Allocate resources appropriate for local testing
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    networks:
      - aml_network

networks:
  aml_network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data: